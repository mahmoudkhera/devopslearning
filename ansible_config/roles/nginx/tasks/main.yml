---
- name: Install Nginx
  apt:
    name: nginx
    state: present
    update_cache: yes

- name: Deploy Nginx proxy config from template
  template:
    src: nginx.config.j2
    dest: /etc/nginx/sites-available/myapp


- name: Enable site
  file:
    src: /etc/nginx/sites-available/myapp
    dest: /etc/nginx/sites-enabled/myapp
    state: link

- name: Remove default config
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Test Nginx config
  command: nginx -t
  register: nginx_test
  changed_when: false

- name: Reload Nginx
  service:
    name: nginx
    state: reloaded
    enabled: yes
    

