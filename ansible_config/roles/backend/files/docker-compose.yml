services:
  backend:
    build: ./backend
    image: mahmoudkhera/backend
    container_name: inventory-backend
    restart: on-failure
    ports:
      - "${BACKEND_PORT}:4000"
    environment:
      - BACK_END_API=${BACK_END_API}
      - PORT=4000
      - DATABASE_URL=${DATABASE_URL}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3