<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Customer Billing</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --border: #2a2d3a;
      --accent: #4ade80;
      --accent-dim: rgba(74,222,128,0.1);
      --text: #e8eaf0;
      --muted: #6b7280;
      --paid: #4ade80;
      --pending: #fbbf24;
      --overdue: #f87171;
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem;
    }

    .topbar {
      width: 100%;
      max-width: 680px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 3rem;
    }

    .logo {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent);
    }

    .logo span { color: var(--muted); font-weight: 400; }

    .api-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.72rem;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 2s infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .search-wrap {
      width: 100%;
      max-width: 680px;
      margin-bottom: 2rem;
    }

    .search-title {
      font-size: 0.7rem;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
    }

    .fields {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 0.75rem;
    }

    .field { display: flex; flex-direction: column; gap: 0.4rem; }

    .field label {
      font-size: 0.7rem;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .field input {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input::placeholder { color: var(--muted); }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(74,222,128,0.1);
    }

    .btn {
      align-self: flex-end;
      padding: 0.75rem 1.5rem;
      background: var(--accent);
      color: #0f1117;
      border: none;
      border-radius: 8px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.97); }

    #output { width: 100%; max-width: 680px; }

    .cust-header {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      animation: fadeIn 0.35s ease;
    }

    .avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--accent-dim);
      border: 2px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600;
      font-size: 1.1rem;
      color: var(--accent);
      flex-shrink: 0;
    }

    .cust-name { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.25rem; }
    .cust-meta { font-size: 0.78rem; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }

    .summary {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 0.75rem;
      margin-bottom: 1rem;
      animation: fadeIn 0.4s ease;
    }

    .sum-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
    }

    .sum-label {
      font-size: 0.68rem;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
    }

    .sum-value { font-family: 'IBM Plex Mono', monospace; font-size: 1.3rem; font-weight: 600; }
    .sum-value.green  { color: var(--paid); }
    .sum-value.yellow { color: var(--pending); }

    .bills-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      animation: fadeIn 0.45s ease;
    }

    .bills-head {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.7rem;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--muted);
    }

    .bill-row {
      display: flex;
      align-items: center;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      gap: 1rem;
      transition: background 0.15s;
    }

    .bill-row:last-child { border-bottom: none; }
    .bill-row:hover { background: rgba(255,255,255,0.02); }

    .bill-id { font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; color: var(--muted); width: 80px; flex-shrink: 0; }

    .bill-desc { flex: 1; }
    .bill-desc .name { font-size: 0.875rem; font-weight: 500; margin-bottom: 0.15rem; }
    .bill-desc .date { font-size: 0.72rem; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }

    .bill-status {
      font-size: 0.7rem;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600;
      padding: 0.25rem 0.6rem;
      border-radius: 6px;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .s-paid    { background: rgba(74,222,128,0.12);  color: var(--paid); }
    .s-pending { background: rgba(251,191,36,0.12);  color: var(--pending); }
    .s-overdue { background: rgba(248,113,113,0.12); color: var(--overdue); }

    .bill-amount { font-family: 'IBM Plex Mono', monospace; font-size: 0.9rem; font-weight: 600; width: 90px; text-align: right; flex-shrink: 0; }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.25rem;
      background: var(--accent-dim);
      border-top: 1px solid var(--accent);
    }

    .total-row span { font-size: 0.72rem; font-family: 'IBM Plex Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .total-row strong { font-family: 'IBM Plex Mono', monospace; font-size: 1.1rem; color: var(--accent); }

    .empty {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.875rem;
      animation: fadeIn 0.35s ease;
    }

    .empty .ico { font-size: 2rem; margin-bottom: 0.75rem; }

    .loader { display: flex; justify-content: center; padding: 2.5rem; }
    .loader::after {
      content: '';
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    @media(max-width:520px) {
      .fields { grid-template-columns: 1fr 1fr; }
      .btn { grid-column: span 2; width: 100%; }
      .summary { grid-template-columns: 1fr 1fr; }
      .bill-id { display: none; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="logo">bill<span>.</span>system</div>
    <div class="api-status"><div class="dot"></div> backend api</div>
  </div>

  <div class="search-wrap">
    <div class="search-title">// look up customer bill</div>
    <div class="fields">
      <div class="field">
        <label>Customer ID</label>
        <input type="text" id="inp-id" placeholder="e.g. C-1001" onkeydown="if(event.key==='Enter') search()"/>
      </div>
      <div class="field">
        <label>Customer Name</label>
        <input type="text" id="inp-name" placeholder="e.g. Ahmed Hassan" onkeydown="if(event.key==='Enter') search()"/>
      </div>
      <button class="btn" onclick="search()">→ Search</button>
    </div>
  </div>

  <div id="output"></div>

<script>
  // ─────────────────────────────────────────
  // Replace with your backend EC2 IP or URL
  const API = 'http://YOUR_BACKEND_IP:3000';
  // ─────────────────────────────────────────

  async function search() {
    const id   = document.getElementById('inp-id').value.trim();
    const name = document.getElementById('inp-name').value.trim();
    if (!id && !name) return;

    document.getElementById('output').innerHTML = '<div class="loader"></div>';

    try {
      const params = new URLSearchParams();
      if (id)   params.append('id', id);
      if (name) params.append('name', name);

      const res = await fetch(`${API}/api/bills?${params}`);
      if (!res.ok) throw new Error('not found');

      const data = await res.json();
      render(data);

    } catch {
      document.getElementById('output').innerHTML = `
        <div class="empty">
          <div class="ico">⚠</div>
          <strong style="color:var(--text);display:block;margin-bottom:.3rem">Customer Not Found</strong>
          No billing records matched your search.
        </div>`;
    }
  }

  // ─────────────────────────────────────────
  // Backend must return this JSON shape:
  // {
  //   customer: { id, name, email, phone },
  //   bills: [{ id, description, date, amount, status }]
  // }
  // status must be: "paid" | "pending" | "overdue"
  // ─────────────────────────────────────────
  function render({ customer, bills }) {
    const fmt  = n => '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2 });
    const init = customer.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const total = bills.reduce((s,b) => s + Number(b.amount), 0);
    const paid  = bills.filter(b=>b.status==='paid').reduce((s,b) => s + Number(b.amount), 0);
    const due   = bills.filter(b=>b.status!=='paid').reduce((s,b) => s + Number(b.amount), 0);
    const pc    = s => ({paid:'s-paid', pending:'s-pending', overdue:'s-overdue'}[s]||'s-pending');

    const rows = bills.map(b => `
      <div class="bill-row">
        <div class="bill-id">${b.id}</div>
        <div class="bill-desc">
          <div class="name">${b.description}</div>
          <div class="date">${b.date}</div>
        </div>
        <div class="bill-status ${pc(b.status)}">${b.status}</div>
        <div class="bill-amount">${fmt(b.amount)}</div>
      </div>`).join('');

    document.getElementById('output').innerHTML = `
      <div class="cust-header">
        <div class="avatar">${init}</div>
        <div>
          <div class="cust-name">${customer.name}</div>
          <div class="cust-meta">${customer.id} · ${customer.email}</div>
        </div>
      </div>
      <div class="summary">
        <div class="sum-card"><div class="sum-label">Total Billed</div><div class="sum-value">${fmt(total)}</div></div>
        <div class="sum-card"><div class="sum-label">Paid</div><div class="sum-value green">${fmt(paid)}</div></div>
        <div class="sum-card"><div class="sum-label">Outstanding</div><div class="sum-value ${due>0?'yellow':'green'}">${fmt(due)}</div></div>
      </div>
      <div class="bills-card">
        <div class="bills-head">// ${bills.length} invoice records</div>
        ${rows}
        <div class="total-row"><span>Total Due</span><strong>${fmt(due)}</strong></div>
      </div>`;
  }
</script>
</body>
</html>
